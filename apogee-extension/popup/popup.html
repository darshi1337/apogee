<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <div id="homeView">
        <div class="header">
            <div class="logo">
                Apogee
            </div>
        </div>
        <button id="summarizeBtn">
            Summarize this page
        </button>
        <input
            id="questionInput"
            placeholder="Ask Apogee a question"
        />
        <div id="status"></div>
    </div>

    <div
        id="summaryView"
        class="hidden"
    >
        <div class="header">
            <div class="logo">
                Apogee
            </div>
            <button id="backBtn">
                ←
            </button>
        </div>
        <div id="summaryCard">
            <pre id="output"></pre>
        </div>
        <input
            id="followupInput"
            placeholder="Ask Apogee"
        />
    </div>

    <script src="popup.js"></script>

</body>
</html>
