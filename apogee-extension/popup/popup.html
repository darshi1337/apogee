<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Apogee</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <div class="container">
      <!-- HOME VIEW -->

      <div id="homeView">
        <header class="header">
          <div class="brand">
            <img src="../assets/logo.svg" class="logo" alt="Apogee Logo" />
            <span class="brand-name">apogee</span>
          </div>

          <div class="header-actions">
            <button id="settingsBtn" class="icon-btn">
              <img src="../assets/settings.svg" alt="Settings" />
            </button>

            <button id="closeBtn" class="icon-btn">
              <img src="../assets/cross_1.svg" alt="Close" />
            </button>
          </div>
        </header>

        <div class="home-buttons">
          <button id="summarizeBtn" class="action-btn">
            <img src="../assets/sparkles.svg" alt="" />
            <span>Summarize this page</span>
          </button>

          <button id="askBtn" class="action-btn">
            <img src="../assets/ask.svg" alt="" />
            <span>Ask Apogee a question</span>
          </button>
        </div>
      </div>

      <!-- SUMMARY VIEW -->

      <div id="summaryView" class="hidden">
        <header class="header">
          <div class="brand">
            <img src="../assets/logo.svg" class="logo" alt="Apogee Logo" />
            <span class="brand-name">apogee</span>
          </div>

          <div class="header-actions">
            <button id="settingsBtn2" class="icon-btn">
              <img src="../assets/settings.svg" alt="Settings" />
            </button>

            <button id="closeBtn2" class="icon-btn">
              <img src="../assets/cross_1.svg" alt="Close" />
            </button>
          </div>
        </header>

        <section class="summary-card">
          <h2>Summarize the page</h2>

          <p id="summaryText">Summary will appear here.</p>
        </section>

        <section class="prompts">
          <div class="section-header">
            <h3 class="section-title">Suggested Prompts</h3>

            <button class="prompts-toggle" aria-label="Hide prompts">
              <img src="../assets/cross_2.svg" alt="Hide" />
            </button>
          </div>

          <button class="prompt-card">
            What is the purpose of Mozilla's Orbit browser extension and how
            does it differ from other AI-powered tools?
          </button>
        </section>

        <section class="chat-section">
          <div class="chat-header">
            <h3>Ask Apogee</h3>

            <button class="suggested-tag" id="togglePromptsBtn">
              Suggested Prompts

              <img src="../assets/up.svg" alt="Toggle" />
            </button>
          </div>

          <div class="chat-box">
            <textarea placeholder="Type here to ask"></textarea>

            <button class="send-btn">
              <img src="../assets/send.svg" alt="Send" />
            </button>
          </div>
        </section>
      </div>

      <!-- SETTINGS VIEW -->

      <div id="settingsView" class="hidden">
        <header class="settings-header">
          <h1>Settings</h1>

          <div class="settings-actions">
            <img
              src="../assets/logo.svg"
              id="settingsLogo"
              class="settings-logo"
              alt="Apogee"
            />

            <button id="closeBtn3" class="icon-btn">
              <img src="../assets/cross_1.svg" alt="Close" />
            </button>
          </div>
        </header>

        <div class="settings-card">
          <div class="card-title">
            <img src="../assets/code.svg" alt="" />
            <span>Response Format</span>
          </div>

          <label class="radio-option">
            <input type="radio" name="format" checked />
            <span>Bullet Points</span>
          </label>

          <label class="radio-option">
            <input type="radio" name="format" />
            <span>Short Sentences</span>
          </label>

          <label class="radio-option">
            <input type="radio" name="format" />
            <span>Paragraphs</span>
          </label>
        </div>

        <div class="settings-card">
          <div class="card-title">
            <img src="../assets/summary.svg" alt="" />
            <span>Summary</span>
          </div>

          <label class="radio-option">
            <input type="radio" name="summary" checked />
            <span> Always ask to summarize content </span>
          </label>

          <label class="radio-option">
            <input type="radio" name="summary" />
            <span> Auto-summarize email. </span>
          </label>

          <label class="radio-option">
            <input type="radio" name="summary" />
            <span> Auto-summarize Youtube. </span>
          </label>

          <label class="radio-option">
            <input type="radio" name="summary" />
            <span> Auto-summarize email and Youtube. </span>
          </label>
        </div>

        <div class="settings-divider"></div>

        <button id="getInTouchBtn" class="settings-contact-btn">
          <div class="settings-contact-left">
            <img src="../assets/mail.svg" alt="" />
            <span>Get in touch</span>
          </div>

          <img src="../assets/arrow-right.svg" class="arrow-icon" alt="" />
        </button>
      </div>
    </div>

    <!-- CONTACT VIEW -->

    <div id="contactView" class="hidden">
      <header class="settings-header">
        <h1>Get in touch</h1>

        <div class="settings-actions">
          <img
            src="../assets/logo.svg"
            id="contactLogo"
            class="settings-logo"
            alt="Apogee"
          />

          <button id="closeBtn4" class="icon-btn">
            <img src="../assets/cross_1.svg" alt="Close" />
          </button>
        </div>
      </header>

      <div class="contact-links">
        <button id="contributeBtn" class="contact-card">
          <div class="contact-card-left">
            <img src="../assets/github.svg" alt="" />
            <span>Contribute</span>
          </div>

          <img src="../assets/arrow-right.svg" class="contact-arrow" alt="" />
        </button>

        <button id="bugBtn" class="contact-card">
          <div class="contact-card-left">
            <img src="../assets/bug.svg" alt="" />
            <span>Report a bug</span>
          </div>

          <img src="../assets/arrow-right.svg" class="contact-arrow" alt="" />
        </button>

        <button id="featureBtn" class="contact-card">
          <div class="contact-card-left">
            <img src="../assets/feature.svg" alt="" />
            <span>Request a feature</span>
          </div>

          <img src="../assets/arrow-right.svg" class="contact-arrow" alt="" />
        </button>
      </div>

      <div class="about-apogee">
        <h2>About Apogee</h2>

        <p>
          Local-first browser assistant for articles, videos, emails and more.
        </p>
      </div>

      <div class="contact-footer">
        <div class="version">v0.1.0</div>

        <div class="made-with">Made with ❤️ by darshi1337</div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
